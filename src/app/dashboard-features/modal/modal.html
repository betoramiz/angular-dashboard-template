<page-content>
  <page-header>Modal</page-header>

  <page-body>
    <section class="space-y-4">
      <header class="text-xl">Modal</header>
      <section class="flex gap-5">
        <button matButton="filled" class="success" (click)="openModal()">Open Confimation Modal</button>
        <button matButton="filled" class="success" (click)="openYesNoModal()">Open Yes/No Modal</button>
        <button matButton="filled" class="success" (click)="openErrorModal()">Open Error Modal</button>
      </section>
    </section>
  </page-body>
</page-content>

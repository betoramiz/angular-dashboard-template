<mat-sidenav-container class="h-full">
  <mat-sidenav mode="side" opened class="side-nav-flat">
    <header class="p-10">
      <img ngSrc="../../../assets/img/image-profile.jpg" alt="profile" height="80" width="80" class="rounded-full mx-auto">
      <div class="flex flex-col text-center mt-4 gap-2.5 text-white">
        <div class="">Alberto Ramirez</div>
        <span class="text-sm">Admin</span>
      </div>
    </header>
    <mat-nav-list>
      <a mat-list-item routerLink="forms" routerLinkActive #rla="routerLinkActive" [activated]="rla.isActive">Forms</a>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item routerLink="buttons" routerLinkActive #rlButtons="routerLinkActive" [activated]="rlButtons.isActive">Butons</a>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item routerLink="modals" routerLinkActive #rlModal="routerLinkActive" [activated]="rlModal.isActive">Modal</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar>Angular Material - Components Customization</mat-toolbar>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
